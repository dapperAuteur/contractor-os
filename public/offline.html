<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0d9488" />
  <title>Offline — CentenarianOS</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f9fafb;
      color: #111827;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }
    .card {
      max-width: 28rem;
      text-align: center;
      background: white;
      border-radius: 1rem;
      padding: 2.5rem 2rem;
      box-shadow: 0 1px 3px rgba(0,0,0,.1);
    }
    .icon {
      width: 3rem;
      height: 3rem;
      margin: 0 auto 1.25rem;
      color: #f59e0b;
    }
    h1 {
      font-size: 1.25rem;
      font-weight: 700;
      margin-bottom: .5rem;
    }
    p {
      font-size: .875rem;
      color: #6b7280;
      line-height: 1.5;
      margin-bottom: 1.5rem;
    }
    a {
      display: inline-block;
      background: #0d9488;
      color: white;
      font-size: .875rem;
      font-weight: 600;
      padding: .625rem 1.25rem;
      border-radius: .5rem;
      text-decoration: none;
    }
    a:hover { background: #0f766e; }
  </style>
</head>
<body>
  <div class="card">
    <svg class="icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
         stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <line x1="2" y1="2" x2="22" y2="22"/>
      <path d="M8.5 16.5a5 5 0 0 1 7 0"/>
      <path d="M2 8.82a15 15 0 0 1 4.17-2.65"/>
      <path d="M10.66 5c4.01-.36 8.14.9 11.34 3.76"/>
      <path d="M16.85 11.25a10 10 0 0 1 2.22 1.68"/>
      <path d="M5 12.86a10 10 0 0 1 5.17-2.86"/>
      <line x1="12" y1="20" x2="12.01" y2="20"/>
    </svg>
    <h1>You're offline</h1>
    <p>
      This page hasn't been cached yet. Previously visited pages are still
      available — try navigating to one you've opened before.
    </p>
    <a href="/dashboard/planner">Go to Planner</a>
  </div>
</body>
</html>
